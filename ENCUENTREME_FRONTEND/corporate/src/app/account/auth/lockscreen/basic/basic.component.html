<div class="auth-page-wrapper pt-5">
  <div class="auth-one-bg-position auth-one-bg" id="auth-particles">
    <div class="bg-overlay"></div>
    <div class="shape">
      <svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1440 120">
        <path d="M 0,36 C 144,53.6 432,123.2 720,124 C 1008,124.8 1296,56.8 1440,40L1440 140L0 140z"></path>
      </svg>
    </div>
  </div>

  <div class="auth-page-content">
    <div class="container">
      <div class="row">
        <div class="col-lg-12">
          <div class="text-center mt-sm-5 mb-4 text-white-50">
            <div>
              <a routerLink="" class="d-inline-block auth-logo text-white fw-bold fs-18">
                <i class="ri-drop-fill me-2"></i>SANTORIN CAR WASH
              </a>
            </div>
            <p class="mt-2 fs-14 fw-medium opacity-75">Sistema de Gestión</p>
          </div>
        </div>
      </div>

      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 col-xl-5">
          <div class="card mt-4">
            <div class="card-body p-4">

              <div class="text-center mt-2">
                <div class="avatar-lg mx-auto mb-3">
                  <div class="avatar-title bg-primary-subtle text-primary rounded-circle fs-24">
                    <i class="ri-lock-line"></i>
                  </div>
                </div>
                <h5 class="text-primary">Pantalla Bloqueada</h5>
                <p class="text-muted fs-13">Ingresa tu contraseña para continuar</p>
              </div>

              <div class="p-2 mt-3">
                <form [formGroup]="lockscreenForm" (ngSubmit)="onSubmit()">
                  <div class="mb-3">
                    <label class="form-label" for="userpassword">Contraseña</label>
                    <div class="input-group">
                      <span class="input-group-text"><i class="ri-lock-line"></i></span>
                      <input type="password" class="form-control" id="userpassword" placeholder="Ingresa tu contraseña"
                        formControlName="password" [ngClass]="{ 'is-invalid': submitted && f['password'].errors }">
                      @if(submitted && f['password'].errors) {
                        <div class="invalid-feedback">
                          @if(f['password'].errors['required']) { La contraseña es requerida }
                        </div>
                      }
                    </div>
                  </div>
                  <div class="mt-4">
                    <button class="btn btn-primary w-100" type="submit">
                      <i class="ri-lock-unlock-line me-2"></i>Desbloquear
                    </button>
                  </div>
                </form>
              </div>

            </div>
          </div>

          <div class="mt-4 text-center">
            <p class="mb-0 text-muted fs-13">
              ¿No eres tú?
              <a routerLink="/auth/signin/basic" class="fw-semibold text-primary text-decoration-underline ms-1">Iniciar sesión</a>
            </p>
          </div>

        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="row">
        <div class="col-lg-12">
          <div class="text-center">
            <p class="mb-0 text-muted">&copy; {{year}} SANTORIN CAR WASH &mdash; Desarrollado por <strong>Miguel Licla</strong></p>
          </div>
        </div>
      </div>
    </div>
  </footer>
</div>
