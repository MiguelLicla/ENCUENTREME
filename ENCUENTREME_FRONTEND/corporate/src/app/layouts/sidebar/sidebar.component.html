<div class="app-menu" [class.open]="isSidebarOpen">
  <nav class="flex flex-col h-full">

    <p class="nav-section-title mt-2">Menú Principal</p>

    <ul class="list-none p-0 m-0 flex flex-col gap-0.5 px-2">

      <li>
        <a class="nav-link" routerLink="/dashboard" routerLinkActive="active"
           [routerLinkActiveOptions]="{exact:true}" (click)="closeMobile()">
          <i class="ri-dashboard-2-line"></i>
          <span>Dashboard</span>
        </a>
      </li>

      <li>
        <a class="nav-link" routerLink="/publicaciones/listado" routerLinkActive="active"
           (click)="closeMobile()">
          <i class="ri-file-list-3-line"></i>
          <span>Reclamaciones</span>
        </a>
      </li>

      <li>
        <a class="nav-link" routerLink="/objetos/listado" routerLinkActive="active"
           (click)="closeMobile()">
          <i class="ri-box-3-line"></i>
          <span>Inventario</span>
        </a>
      </li>

      <li>
        <a class="nav-link" routerLink="/entregas" routerLinkActive="active"
           (click)="closeMobile()">
          <i class="ri-truck-line"></i>
          <span>Entregas</span>
        </a>
      </li>

      <li>
        <a class="nav-link" routerLink="/donaciones" routerLinkActive="active"
           (click)="closeMobile()">
          <i class="ri-heart-3-line"></i>
          <span>Donaciones</span>
        </a>
      </li>

    </ul>

    <div class="mt-auto p-4">
      <div class="rounded-xl p-3" style="background:var(--brand-light);">
        <p class="text-[11px] font-bold mb-1" style="color:var(--brand);">Plaza Norte</p>
        <p class="text-[11px] mb-0" style="color:var(--brand-dark);">Sistema de Gestión de Objetos Perdidos</p>
      </div>
    </div>

  </nav>

<div class="vertical-overlay" [class.open]="isSidebarOpen" (click)="SidebarHide()"></div>
